<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">
      TETRIS
      <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar entre modo oscuro y claro" title="Cambiar tema">
        <span class="knob"></span>
      </button>
    </h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section records">
          <span class="label">RECORDS</span>
          <ol id="leaderboard-list" class="leaderboard-list"></ol>
          <span class="stat-line">Mejor combo: <span class="value-small" id="best-combo">0</span></span>
          <span class="stat-line">Máx. líneas: <span class="value-small" id="max-lines">0</span></span>
          <button id="reset-scores-btn">Reset récords</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="new-highscore" class="new-highscore hidden">
          <p class="new-highscore-msg">¡Nuevo récord!</p>
          <input id="player-name-input" maxlength="12" placeholder="AAA" autocomplete="off" />
          <button id="save-score-btn">Guardar</button>
        </div>
        <ol id="overlay-leaderboard-list" class="leaderboard-list"></ol>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
