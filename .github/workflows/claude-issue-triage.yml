name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Analiza el issue #${{ github.event.issue.number }} de este repo (título y body).

            1. Revisa el código del proyecto (juego de Tetris en vanilla JS, ver CLAUDE.md) si el issue lo amerita, para entender de qué parte del código podría tratarse.
            2. Asigna únicamente labels que ya existan en el repo (bug, documentation, duplicate, enhancement, good first issue, help wanted, invalid, question, wontfix) — el/los que mejor apliquen. No crees labels nuevos.
            3. Postea UN comentario (con formato markdown) en el issue con un diagnóstico breve: posible causa raíz, archivo(s)/función(es) involucradas si identificables (ej. game.js: collide(), tryRotate()), y pasos sugeridos de reproducción o info faltante si el reporte es ambiguo.

            Usa `gh issue edit ${{ github.event.issue.number }} --add-label "..."` para labels y `gh issue comment ${{ github.event.issue.number }} --body "..."` para el comentario.
          claude_args: '--allowed-tools "Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*)"'
